[package]
name = "colmap-openmvs-app"
version = "0.1.0"
authors = ["Yeicor <yeicor+no-reply@github.com>"]
edition = "2021"

[dependencies]
dioxus = { version = "0.7.7", features = ["router", "fullstack"] }
dioxus-free-icons = {version = "0.10.0", features = ["bootstrap"] }
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", version = "0.0.1", default-features = false }

serde = { version = "*", features = ["derive"] } # Same version as dioxus
serde_derive_default = "0.1"

tokio = { version = "*", features = ["sync", "macros", "rt"] }

# Web/WASM dependencies for file handling
web-sys = { version = "0.3", features = ["Document", "Element", "HtmlInputElement", "FileList", "File", "FileReader", "Window", "console"] }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"

# Runtime system dependencies
reqwest = { version = "0.11", features = ["json", "stream", "rustls"] }
serde_json = "1.0"
thiserror = "1.0"
which = "5.0"
tar = "0.4"
xz2 = "0.1"
sevenz-rust2 = "0.21"

[features]
default = ["desktop"]
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]
server = ["dioxus/server"]
