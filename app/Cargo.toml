[package]
name = "colmap-openmvs-app"
version.workspace = true
authors.workspace = true
edition.workspace = true

[dependencies]
colmap-openmvs-api = { path = "../api" }
colmap-openmvs-backend = { path = "../backend", optional = true }

# UI Framework
dioxus = { version = "0.7.9", features = ["fullstack", "router"] }
dioxus-free-icons = { version = "0.10.0", features = ["bootstrap"] }
dioxus-primitives = { git = "https://github.com/DioxusLabs/components", version = "0.0.1", default-features = false }

# Utilities
urlencoding = { version = "2.1" }
base64 = { version = "0.22" }
chrono = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-log = { workspace = true }

[features]
default = []

# Client target features
web = ["dioxus/web"]
desktop = ["dioxus/desktop"]
mobile = ["dioxus/mobile"]

server = ["dioxus/server", "colmap-openmvs-backend"]
