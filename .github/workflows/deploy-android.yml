# F-Droid deployment.  Downloads the signed APKs produced by
# build-android.yml and assembles a self-hosted F-Droid repository.
#
# Called from:
#   - ci.yml (after all build jobs succeed)
#   - build-android.yml (on schedule / dispatch, as deploy-orchestration)

on:
  workflow_call:

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jdk-headless
          python3 -m venv /tmp/fdroid-venv
          source /tmp/fdroid-venv/bin/activate
          pip install fdroidserver
          echo "PATH=/tmp/fdroid-venv/bin:$PATH" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          pattern: build-android-apk-*
          merge-multiple: true
          path: apks

      - uses: actions/download-artifact@v4
        with:
          name: fdroid-metadata
          path: fdroid-metadata

      - shell: bash
        run: |
          set -eu

          mkdir -p fdroid-repo
          cd fdroid-repo

          fdroid init --quiet

          # Copy signed APKs into the repo
          if [ -d ../apks ]; then
            cp ../apks/*.apk repo/ 2>/dev/null || true
          fi
          echo "📦 APKs in repo:"
          ls -lh repo/ 2>/dev/null || echo "(none)"

          # Write F-Droid YAML metadata using the fastlane templates
          python3 -c "
          import yaml, os, re

          metadata = {
              'Categories': ['Graphics'],
              'License': 'Apache-2.0',
              'AuthorName': 'Yeicor',
              'SourceCode': 'https://github.com/yeicor/colmap-openmvs-app',
              'IssueTracker': 'https://github.com/yeicor/colmap-openmvs-app/issues',
              'WebSite': 'https://yeicor.github.io/colmap-openmvs-app',
              'AutoName': 'COLMAP OpenMVS App',
              'Summary': '3D reconstruction from images',
          }

          # Prefer fastlane metadata if available
          fastlane_desc = '../fdroid-metadata/metadata/android/en-US/full_description.txt'
          if os.path.exists(fastlane_desc):
              with open(fastlane_desc) as f:
                  content = f.read().strip()
                  if content:
                      metadata['Description'] = content

          if 'Description' not in metadata:
              readme = '../README.md'
              if os.path.exists(readme):
                  with open(readme) as f:
                      content = f.read()
                  content = re.sub(r'^#.*', '', content, flags=re.MULTILINE).strip()
                  lines = [l for l in content.split(chr(10)) if l.strip()][:20]
                  if lines:
                      metadata['Description'] = chr(10).join(lines)

          os.makedirs('metadata', exist_ok=True)
          with open('metadata/com.github.yeicor.colmap_openmvs_app.yml', 'w') as f:
              yaml.dump(metadata, f, default_flow_style=False, allow_unicode=True)
          print('Generated F-Droid YAML metadata')
          "

          # Generate repo index and signing key
          fdroid update --create-key --pretty 2>&1

          echo "📦 Final repo structure:"
          find . -type f -not -path './.git/*' | sort

      - uses: actions/upload-artifact@v4
        with:
          name: fdroid-repo
          path: fdroid-repo/
