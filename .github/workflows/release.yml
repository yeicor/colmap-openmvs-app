on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  find-ci-artifacts:
    runs-on: ubuntu-latest
    outputs:
      ci-run-id: ${{ steps.get-run-id.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4

      - id: get-run-id
        run: |
          # Get the commit SHA for the tag
          COMMIT_SHA=$(git rev-list -n 1 ${{ github.ref }})
          echo "Commit SHA: $COMMIT_SHA"

          # Try to find the latest successful CI run for this commit, waiting up to 1 hour
          MAX_ATTEMPTS=360  # 1 hour if we sleep 10 seconds per attempt
          SLEEP_SECONDS=10
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            CI_RUN_ID=$(gh run list \
              --workflow ci.yml \
              --commit $COMMIT_SHA \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -n "$CI_RUN_ID" ]; then
              echo "Found CI run: $CI_RUN_ID"
              echo "run-id=$CI_RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
            ATTEMPT=$((ATTEMPT+1))
            echo "No successful CI run found for commit $COMMIT_SHA yet. Attempt $ATTEMPT/$MAX_ATTEMPTS. Waiting $SLEEP_SECONDS seconds..."
            sleep $SLEEP_SECONDS
          done
          echo "No successful CI run found for commit $COMMIT_SHA after waiting 1 hour."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: find-ci-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.find-ci-artifacts.outputs.ci-run-id }}
          pattern: build-*
          path: artifacts

      - uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ github.repository }}:buildcache,mode=max
