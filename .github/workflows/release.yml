on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  download-ci-artifacts:
    runs-on: ubuntu-latest
    outputs:
      ci-run-id: ${{ steps.get-run-id.outputs.run-id }}
    steps:
      - uses: actions/checkout@v4

      - id: get-run-id
        run: |
          # Get the commit SHA for the tag
          COMMIT_SHA=$(git rev-list -n 1 ${{ github.ref }})
          echo "Commit SHA: $COMMIT_SHA"

          # Try to find the latest successful CI run for this commit, waiting up to 1 hour
          MAX_ATTEMPTS=360  # 1 hour if we sleep 10 seconds per attempt
          SLEEP_SECONDS=10
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            CI_RUN_ID=$(gh run list \
              --workflow ci.yml \
              --commit $COMMIT_SHA \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -n "$CI_RUN_ID" ]; then
              echo "Found CI run: $CI_RUN_ID"
              echo "run-id=$CI_RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
            ATTEMPT=$((ATTEMPT+1))
            echo "No successful CI run found for commit $COMMIT_SHA yet. Attempt $ATTEMPT/$MAX_ATTEMPTS. Waiting $SLEEP_SECONDS seconds..."
            sleep $SLEEP_SECONDS
          done
          echo "No successful CI run found for commit $COMMIT_SHA after waiting 1 hour."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    needs: download-ci-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.download-ci-artifacts.outputs.ci-run-id }}
          pattern: build-*
          path: artifacts

      - run: |
          mkdir -p release-artifacts
          find artifacts -type f -exec cp {} release-artifacts/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-all-build-artifacts
          path: release-artifacts/
          retention-days: 1

  package-web:
    needs: download-ci-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.download-ci-artifacts.outputs.ci-run-id }}
          name: build-wasm32-unknown-unknown-server
          path: artifacts

      - run: |
          mkdir -p release-artifacts/web
          cp -r artifacts/dist/* release-artifacts/web/ 2>/dev/null || cp -r artifacts/* release-artifacts/web/

      - run: |
          cd release-artifacts
          tar czf colmap-openmvs-app-web.tar.gz web/
          zip -r colmap-openmvs-app-web.zip web/
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-web
          path: release-artifacts/
          retention-days: 1

  package-server:
    needs: download-ci-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ needs.download-ci-artifacts.outputs.ci-run-id }}
          name: build-server
          path: artifacts

      - run: |
          mkdir -p release-artifacts
          cp "artifacts/colmap-openmvs-app" "release-artifacts/colmap-openmvs-app-server"

      - run: |
          cd release-artifacts
          tar czf colmap-openmvs-app-server-linux-x64.tar.gz colmap-openmvs-app-server
          zip colmap-openmvs-app-server-linux-x64.zip colmap-openmvs-app-server
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-server
          path: release-artifacts/
          retention-days: 1

  release:
    needs: [package, package-web, package-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - run: |
          mkdir -p final-artifacts
          find all-artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} final-artifacts/ \;

      - uses: softprops/action-gh-release@v1
        with:
          files: final-artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    needs: package-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packaged-web
          path: web-output

      - run: |
          mkdir -p web-dist
          cd web-output
          tar xzf colmap-openmvs-app-web.tar.gz -C ../web-dist/
          cd ..

      - uses: actions/upload-pages-artifact@v2
        with:
          path: web-dist/web

      - id: deployment
        uses: actions/deploy-pages@v2

  docker:
    needs: download-ci-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
