# This is not integrated with ci.yml since the whole docker image needs to be embedded into android builds (security limitation), so we want to regularly trigger only this workflow when the base image changes or when manually requested. Also called from ci.yml automatically on main branch.

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force Android rebuild
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      force:
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 0 * * *" # nightly UTC

permissions:
  actions: read
  contents: read

jobs:
  check-image-updates:
    runs-on: ubuntu-24.04
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      digest: ${{ steps.check.outputs.digest }}

    steps:
      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            mirror.gcr.io/yeicor/colmap-openmvs:cpu-latest \
            --format '{{json .Manifest}}' |
            jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > current-digest.txt

      - name: Download previous digest artifact
        id: previous
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: android.yml
          branch: main
          name: source-image-digest
          search_artifacts: true
          path: previous
          if_no_artifact_found: warn

      - name: Compare digests
        id: check
        env:
          FORCE: ${{ inputs.force || false }}
          CURRENT_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f previous/digest.txt ]; then
            echo "No previous digest found"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_DIGEST=$(cat previous/digest.txt)

          echo "Current:  $CURRENT_DIGEST"
          echo "Previous: $PREVIOUS_DIGEST"

          if [ "$CURRENT_DIGEST" != "$PREVIOUS_DIGEST" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  # ─── Build ──────────────────────────────────────────────────────────
  # Parallelized across (target × package-type) — AAB and APK build
  # simultaneously for both architectures.
  build:
    needs: check-image-updates
    if: needs.check-image-updates.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-android
            package-type: aab
          - target: x86_64-linux-android
            package-type: apk
          - target: aarch64-linux-android
            package-type: aab
          - target: aarch64-linux-android
            package-type: apk
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash

      - shell: bash
        run: |
          dx bundle --android --package-types ${{ matrix.package-type }} --features server --target ${{ matrix.target }} --release

      - name: Sign Android packages (AAB)
        if: matrix.package-type == 'aab'
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          base64 -d<<<"$ANDROID_KEYSTORE_B64">ks.jks
          find target -type f -path '*/release/android/*/bundle/*.aab' -exec \
            jarsigner -keystore ks.jks -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" -signedjar {} {} "$ANDROID_KEY_ALIAS" \;

      - name: Sign Android packages (APK)
        if: matrix.package-type == 'apk'
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          base64 -d<<<"$ANDROID_KEYSTORE_B64">ks.jks
          ZIPALIGN=$(command -v zipalign) || [ -n "${ANDROID_SDK_ROOT:-}" ] && ZIPALIGN=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 2 -name zipalign -type f 2>/dev/null | sort -V | tail -1)
          APKSIGNER=$(command -v apksigner) || [ -n "${ANDROID_SDK_ROOT:-}" ] && APKSIGNER=$(find "$ANDROID_SDK_ROOT/build-tools" -maxdepth 2 -name apksigner -type f 2>/dev/null | sort -V | tail -1)
          if [ -n "${ZIPALIGN}" ] && [ -n "${APKSIGNER}" ]; then
            find target -type f -path '*/outputs/apk/debug/*.apk' -exec sh -c '"$0" -p -f -v 4 "$1" "$1.tmp" && mv "$1.tmp" "$1"' "$ZIPALIGN" {} \;
            find target -type f -path '*/outputs/apk/debug/*.apk' -exec \
              "$APKSIGNER" sign --ks ks.jks --ks-key-alias "$ANDROID_KEY_ALIAS" \
                --ks-pass env:ANDROID_KEYSTORE_PASSWORD --key-pass env:ANDROID_KEY_PASSWORD {} \;
          else
            echo "⚠️  zipalign/apksigner not found — skipping APK signing"
          fi

      - name: Prepare artifact (AAB)
        if: matrix.package-type == 'aab'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p android-output
          # Copy AAB with target-specific name
          for aab in $(find target -type f -path '*/release/android/*/bundle/*.aab'); do
            cp "$aab" "android-output/app-release-${{ matrix.target }}.aab"
          done
          # Copy mapping file with target-specific name
          for mapping in $(find target -type f -path '*/release/android/*/mapping.txt'); do
            cp "$mapping" "android-output/mapping-${{ matrix.target }}.txt"
          done
          # Copy debug symbols keyed by ABI subdirectory (strip intermediate Gradle folders)
          for symbols_dir in $(find target -type d -path '*/release/android/*/merged_jni_libs/release/*/out'); do
            for abi_dir in "$symbols_dir"/*/; do
              [ -d "$abi_dir" ] || continue
              abi="$(basename "$abi_dir")"
              mkdir -p "android-output/debug-symbols/${abi}"
              cp -r "$abi_dir/." "android-output/debug-symbols/${abi}/"
            done
          done
          echo "📦 Artifact contents:"
          find android-output -type f

      - name: Prepare artifact (APK)
        if: matrix.package-type == 'apk'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p apk-collect
          for apk in $(find target -type f -path '*/outputs/apk/debug/*.apk'); do
            target_name="app-release-${{ matrix.target }}.apk"
            cp "$apk" "apk-collect/$target_name"
          done
          echo "📦 Artifact contents:"
          find apk-collect -type f

      - uses: actions/upload-artifact@v4
        if: matrix.package-type == 'aab'
        with:
          name: build-android-aab-${{ matrix.target }}
          path: android-output/

      - uses: actions/upload-artifact@v4
        if: matrix.package-type == 'apk'
        with:
          name: build-android-apk-${{ matrix.target }}
          path: apk-collect/

  # ─── Google Play Store ─────────────────────────────────────────────
  # Publishes AABs to Google Play. On tag push (v*) deploys to
  # production+beta+internal; on main branch deploys to beta+internal only.
  deploy-googleplay:
    needs: [check-image-updates, build]
    if: needs.check-image-updates.outputs.should-build == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: build-android-aab-*
          merge-multiple: true
          path: android-artifacts

      - id: upload-info
        shell: bash
        run: |
          echo "release-files=$(find android-artifacts -type f -name '*.aab' | sort | tr '\n' ',')" >> "$GITHUB_OUTPUT"
          if [ -d android-artifacts/debug-symbols ]; then
            echo "debug-symbols-folder=$(pwd)/android-artifacts/debug-symbols" >> "$GITHUB_OUTPUT"
          fi
          first_mapping=$(find android-artifacts -type f -name 'mapping-*.txt' | head -1)
          if [ -n "$first_mapping" ]; then
            echo "mapping-file=$first_mapping" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tracks=production,beta,internal" >> "$GITHUB_OUTPUT"
          else
            echo "tracks=beta,internal" >> "$GITHUB_OUTPUT"
          fi

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.yeicor.colmap_openmvs_app
          releaseFiles: ${{ steps.upload-info.outputs.release-files }}
          tracks: ${{ steps.upload-info.outputs.tracks }}
          debugSymbols: ${{ steps.upload-info.outputs.debug-symbols-folder || '' }}
          mappingFile: ${{ steps.upload-info.outputs.mapping-file || '' }}

  # ─── Save source digest (runs after all deploy jobs complete) ──────
  save-digest:
    needs: [check-image-updates, build, deploy-googleplay]
    if: needs.check-image-updates.outputs.should-build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Save source digest
        run: |
          echo '${{ needs.check-image-updates.outputs.digest }}' > digest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: source-image-digest
          path: digest.txt
