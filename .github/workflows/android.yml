on:
  workflow_dispatch:
    inputs:
      force:
        description: Force Android rebuild
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      force:
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 0 * * *" # nightly UTC

permissions:
  actions: read
  contents: read

jobs:
  check-image-updates:
    runs-on: ubuntu-24.04
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      digest: ${{ steps.check.outputs.digest }}

    steps:
      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            mirror.gcr.io/yeicor/colmap-openmvs:cpu-latest \
            --format '{{json .Manifest}}' |
            jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > current-digest.txt

      - name: Download previous digest artifact
        id: previous
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: android.yml
          branch: main
          name: source-image-digest
          search_artifacts: true
          path: previous
          if_no_artifact_found: warn

      - name: Compare digests
        id: check
        env:
          FORCE: ${{ inputs.force || false }}
          CURRENT_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f previous/digest.txt ]; then
            echo "No previous digest found"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_DIGEST=$(cat previous/digest.txt)

          echo "Current:  $CURRENT_DIGEST"
          echo "Previous: $PREVIOUS_DIGEST"

          if [ "$CURRENT_DIGEST" != "$PREVIOUS_DIGEST" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-image-updates
    if: needs.check-image-updates.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-android
          - target: aarch64-linux-android
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash

      - shell: bash
        run: |
          dx bundle --android --package-types aab --features server --target ${{ matrix.target }} --release

      - name: Sign AAB
        shell: bash
        run: |
          set -Eeuo pipefail

          : "${ANDROID_KEYSTORE_B64:?Missing ANDROID_KEYSTORE_B64}"
          : "${ANDROID_KEY_ALIAS:?Missing ANDROID_KEY_ALIAS}"
          : "${ANDROID_KEYSTORE_PASSWORD:?Missing ANDROID_KEYSTORE_PASSWORD}"
          : "${ANDROID_KEY_PASSWORD:?Missing ANDROID_KEY_PASSWORD}"

          echo "🔐 Decoding keystore from ANDROID_KEYSTORE_B64"
          KEYSTORE_FILE="$(mktemp)"
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > "$KEYSTORE_FILE"
          trap 'rm -f "$KEYSTORE_FILE"' EXIT

          # jarsigner is pre-installed on ubuntu-24.04 runners (comes with the JDK)
          command -v jarsigner >/dev/null || sudo apt-get install -y default-jdk-headless

          find target -type f -path '*/release/android/*/bundle/*.aab' | while read -r aab; do
            echo "🔐 Signing AAB: $aab"
            jarsigner \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore "$KEYSTORE_FILE" \
              -storepass "$ANDROID_KEYSTORE_PASSWORD" \
              -keypass "$ANDROID_KEY_PASSWORD" \
              "$aab" \
              "$ANDROID_KEY_ALIAS"
            echo "✔ Signed: $aab"
          done
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p android-output
          # Copy AAB with target-specific name to avoid conflicts when merging
          for aab in $(find target -type f -path '*/release/android/*/bundle/*.aab'); do
            cp "$aab" "android-output/app-release-${{ matrix.target }}.aab"
          done
          # Copy mapping file with target-specific name
          for mapping in $(find target -type f -path '*/release/android/*/mapping.txt'); do
            cp "$mapping" "android-output/mapping-${{ matrix.target }}.txt"
          done
          # Copy debug symbols keyed by ABI subdirectory
          for symbols_dir in $(find target -type d -path '*/release/android/*/merged_jni_libs/release/*/out'); do
            abi="$(basename "$(dirname "$symbols_dir")")"
            mkdir -p "android-output/debug-symbols/${abi}"
            cp -r "$symbols_dir/." "android-output/debug-symbols/${abi}/"
          done
          echo "📦 Artifact contents:"
          find android-output -type f

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ matrix.target }}
          path: android-output/

  deploy:
    needs: [check-image-updates, build]
    if: needs.check-image-updates.outputs.should-build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: android-aab-*
          merge-multiple: true
          path: android-artifacts

      - id: upload-info
        shell: bash
        run: |
          # Comma-separated list of AABs for upload
          echo "release-files=$(find android-artifacts -type f -name '*.aab' | sort | tr '\n' ',')" >> "$GITHUB_OUTPUT"

          # Merge debug symbols from all architectures into one directory
          if [ -d android-artifacts/debug-symbols ]; then
            echo "debug-symbols-folder=$(pwd)/android-artifacts/debug-symbols" >> "$GITHUB_OUTPUT"
          fi

          # Use the first mapping file found (one per architecture)
          first_mapping=$(find android-artifacts -type f -name 'mapping-*.txt' | head -1)
          if [ -n "$first_mapping" ]; then
            echo "mapping-file=$first_mapping" >> "$GITHUB_OUTPUT"
          fi

          # Determine which tracks to publish to
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tracks=production,beta,internal" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "tracks=beta,internal" >> "$GITHUB_OUTPUT"
          else
            echo "tracks=internal" >> "$GITHUB_OUTPUT"
          fi

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.yeicor.colmap_openmvs_app
          releaseFiles: ${{ steps.upload-info.outputs.release-files }}
          tracks: ${{ steps.upload-info.outputs.tracks }}
          debugSymbols: ${{ steps.upload-info.outputs.debug-symbols-folder || '' }}
          mappingFile: ${{ steps.upload-info.outputs.mapping-file || '' }}
          # status: draft # Defaults to "completed", set to "draft" to create a draft release instead

      - name: Save source digest
        run: |
          echo '${{ needs.check-image-updates.outputs.digest }}' > digest.txt

      - uses: actions/upload-artifact@v4
        with:
          name: source-image-digest
          path: digest.txt
