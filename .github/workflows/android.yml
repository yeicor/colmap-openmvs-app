on:
  workflow_dispatch:
    inputs:
      force:
        description: Force Android rebuild
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      force:
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 0 * * *" # nightly UTC

permissions:
  actions: read
  contents: read

jobs:
  check-image-updates:
    runs-on: ubuntu-24.04
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      digest: ${{ steps.check.outputs.digest }}

    steps:
      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            mirror.gcr.io/yeicor/colmap-openmvs:cpu-latest \
            --format '{{json .Manifest}}' |
            jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > current-digest.txt

      - name: Download previous digest artifact
        id: previous
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: android.yml
          branch: main
          name: source-image-digest
          search_artifacts: true
          path: previous
          if_no_artifact_found: warn

      - name: Compare digests
        id: check
        env:
          FORCE: ${{ inputs.force || false }}
          CURRENT_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f previous/digest.txt ]; then
            echo "No previous digest found"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_DIGEST=$(cat previous/digest.txt)

          echo "Current:  $CURRENT_DIGEST"
          echo "Previous: $PREVIOUS_DIGEST"

          if [ "$CURRENT_DIGEST" != "$PREVIOUS_DIGEST" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: check-image-updates
    if: needs.check-image-updates.outputs.should-build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: "platform-tools cmdline-tools;latest build-tools;36.1.0 platforms;android-36"

      - name: Install Android NDK r26d
        shell: bash
        run: |
          NDK_VERSION="26.3.11579264"
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "SDK_ROOT=$SDK_ROOT"
          NDK_DIR="$SDK_ROOT/ndk/$NDK_VERSION"
          if [ -d "$NDK_DIR" ]; then
            echo "NDK already installed at $NDK_DIR"
          else
            echo "Downloading NDK r26d..."
            # Download from Google's official NDK releases
            curl -L -o /tmp/ndk.zip \
              "https://dl.google.com/android/repository/android-ndk-r26d-linux.zip"
            unzip -q /tmp/ndk.zip -d /tmp/ndk-extract
            mkdir -p "$SDK_ROOT/ndk/"
            mv /tmp/ndk-extract/android-ndk-r26d "$NDK_DIR"
            rm -rf /tmp/ndk.zip /tmp/ndk-extract
            echo "NDK installed at $NDK_DIR"
          fi
          echo "ANDROID_NDK_HOME=$NDK_DIR" >> "$GITHUB_ENV"
          TOOLCHAIN_PATH="$NDK_DIR/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "$TOOLCHAIN_PATH" >> "$GITHUB_PATH"
          echo "CC_x86_64-linux-android=$TOOLCHAIN_PATH/x86_64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "AR_x86_64-linux-android=$TOOLCHAIN_PATH/llvm-ar" >> "$GITHUB_ENV"
          echo "CC_aarch64-linux-android=$TOOLCHAIN_PATH/aarch64-linux-android21-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64-linux-android=$TOOLCHAIN_PATH/llvm-ar" >> "$GITHUB_ENV"

      - shell: bash
        run: |
          rustup target add aarch64-linux-android x86_64-linux-android

      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash

      - name: Verify NDK setup
        shell: bash
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android"*-clang | head -5
          echo "=== libunwind check ==="
          find "$ANDROID_NDK_HOME" -name "*unwind*" 2>/dev/null | head -10
          echo "=== liblog check ==="
          find "$ANDROID_NDK_HOME" -name "liblog.so" 2>/dev/null | head -10

      - shell: bash
        run: |
          dx bundle --android --package-types aab --features server --target x86_64-linux-android 2>&1
          dx bundle --android --package-types aab --features server --target aarch64-linux-android 2>&1
        env:
          CARGO_TERM_VERBOSE: true
          CARGO_TERM_COLOR: always
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - id: upload-info
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tracks=production,beta,internal" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "tracks=beta,internal" >> "$GITHUB_OUTPUT"
          else
            echo "tracks=internal" >> "$GITHUB_OUTPUT"
          fi
          echo "release-files=$(find target -type f -path '*/release/android/*/bundle/*.aab' | tr '\n' ',')" >> "$GITHUB_OUTPUT"
          echo "debug-symbols-folder=$(find target -type d -path '*/release/android/*/merged_jni_libs/release/*/out')" >> "$GITHUB_OUTPUT"
          echo "mapping-file=$(find target -type f -path '*/release/android/*/mapping.txt')" >> "$GITHUB_OUTPUT"

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.yeicor.colmap_openmvs_app
          releaseFiles: ${{ steps.upload-info.outputs.release-files }}
          tracks: ${{ steps.upload-info.outputs.tracks }}
          debugSymbols: ${{ steps.upload-info.outputs.debug-symbols-folder }}
          mappingFile: ${{ steps.upload-info.outputs.mapping-file }}
          # status: draft # Defaults to "completed", set to "draft" to create a draft release instead

      - name: Save source digest
        run: |
          echo '${{ needs.check-image-updates.outputs.digest }}' > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-image-digest
          path: digest.txt
