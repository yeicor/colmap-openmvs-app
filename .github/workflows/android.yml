on:
  workflow_dispatch:
    inputs:
      force:
        description: Force Android rebuild
        required: false
        type: boolean
        default: true

  workflow_call:
    inputs:
      force:
        required: false
        type: boolean
        default: false

  schedule:
    - cron: "0 3 * * *" # nightly UTC

permissions:
  actions: read
  contents: read

jobs:
  check-image-updates:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
      digest: ${{ steps.check.outputs.digest }}

    steps:
      - name: Get current digest
        id: digest
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            mirror.gcr.io/yeicor/colmap-openmvs:cpu-latest \
            --format '{{json .Manifest}}' |
            jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest')

          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "$DIGEST" > current-digest.txt

      - name: Download previous digest artifact
        id: previous
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: android.yml
          branch: main
          name: source-image-digest
          path: previous
          if_no_artifact_found: warn

      - name: Compare digests
        id: check
        env:
          FORCE: ${{ inputs.force || false }}
          CURRENT_DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          if [ "$FORCE" = "true" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f previous/digest.txt ]; then
            echo "No previous digest found"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIOUS_DIGEST=$(cat previous/digest.txt)

          echo "Current:  $CURRENT_DIGEST"
          echo "Previous: $PREVIOUS_DIGEST"

          if [ "$CURRENT_DIGEST" != "$PREVIOUS_DIGEST" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: check-image-updates
    if: needs.check-image-updates.outputs.should-build == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm

      - shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash

      - shell: bash
        run: | # Note: keep in sync with ci.yml
          ./build_android.sh --release --target=arm64
          ./build_android.sh --release --target=x86_64
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - id: upload-info
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tracks=production,beta,internal" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            echo "tracks=beta,internal" >> "$GITHUB_OUTPUT"
          else
            echo "tracks=internal" >> "$GITHUB_OUTPUT"
          fi
          echo "release-files=$(find target -type f -path '*/release/android/*/app-release.aab' | tr '\n' ',')" >> "$GITHUB_OUTPUT"

      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.yeicor.colmap_openmvs_app
          releaseFiles: ${{ steps.upload-info.outputs.release-files }}
          tracks: ${{ steps.upload-info.outputs.tracks }}

      - name: Save source digest
        run: |
          echo '${{ needs.check-image-updates.outputs.digest }}' > digest.txt

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-image-digest
          path: digest.txt
