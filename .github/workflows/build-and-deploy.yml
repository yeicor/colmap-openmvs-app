on:
  push:
    branches: [main, renovate/**]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test-desktop-and-web:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.AppImage'"
          - os: ubuntu-24.04-arm
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.AppImage'"
          - os: macos-26-intel
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.dmg'"
          - os: macos-26
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.dmg'"
          - os: windows-2025-vs2026 # AMD64-only for now...
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*-setup.exe'"
          - os: ubuntu-24.04
            build-type: web
            artifact-find: "-path '*/release/web/*' -not -name '.manifest.json'"
          - os: ubuntu-24.04-arm # Architecture matters for the server binary
            build-type: web
            artifact-find: "-path '*/release/web/*' -not -name '.manifest.json'"
          - os: ubuntu-24.04
            build-type: web-demo
            artifact-find: "-path '*/release/web/public/*'"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld
      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash
      - shell: bash
        if: matrix.build-type == 'desktop'
        run: |
          # cargo build --release --features server,desktop -vv # helps detect errors
          $HOME/.dx/bin/dx bundle --release --${{ matrix.build-type }} --features server --verbose
          RUST_LOG=debug,h2=info cargo test --workspace --all-targets -- --show-output
      - shell: bash
        if: startsWith(matrix.build-type, 'web')
        run: |
          echo -e "\n\n[web.app]\nbase_path = \"/${{ github.event.repository.name }}\"" >> Dioxus.toml  # Ensure correct base path for GitHub Pages
          $HOME/.dx/bin/dx bundle --web --release --verbose ${{ matrix.build-type == 'web-demo' && '--no-default-features --features=demo' || '' }}

      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact_out
          echo "📂 Scanning files..."
          FILES=()
          while IFS= read -r f; do
            FILES+=("$f")
          done < <(find target -type f ${{ matrix.artifact-find }} || true)
          echo "📊 Match summary: ${#FILES[@]} file(s)"
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "❌ No artifacts found."
            echo "📁 Full target/ tree:"
            find target -type f
            exit 1
          fi
          echo "📄 Matched files:"
          for f in "${FILES[@]}"; do
            echo "  - $f"
          done
          echo "--------------------------------------------------"
          if [ "${#FILES[@]}" -eq 1 ]; then
            echo "📦 Single artifact detected → copying directly"
            cp -v "${FILES[0]}" artifact_out/
          else
            echo "📦 Multiple artifacts → copying to output with normalized hierarchy"
            TMPDIR="$(mktemp -d)"
            echo "📁 Staging dir: $TMPDIR"
            # 1. Find common directory prefix
            COMMON_PREFIX=""
            for f in "${FILES[@]}"; do
              dir="$(dirname "$f")"
              if [ -z "$COMMON_PREFIX" ]; then
                COMMON_PREFIX="$dir"
              else
                # reduce to common prefix
                while [[ "$dir" != "$COMMON_PREFIX"* ]]; do
                  COMMON_PREFIX="$(dirname "$COMMON_PREFIX")"
                done
              fi
            done
            echo "📌 Common prefix: $COMMON_PREFIX"
            # 2. Copy files preserving relative structure after prefix
            for f in "${FILES[@]}"; do
              rel="${f#"$COMMON_PREFIX"/}"
              target="artifact_out/$rel"
              mkdir -p "$(dirname "$target")"
              echo "➜ staging: $f → $rel"
              cp -v "$f" "$target"
            done
            rm -rf "$TMPDIR"
          fi
          echo "✅ Final artifact:"
          ls -lah artifact_out/
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.build-type }}-${{ matrix.target || matrix.os }}
          path: artifact_out/*

  # Runs in parallel with build-and-test-desktop-and-web — builds Docker images and
  # pushes layer cache; does not push to target registries.
  build-docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - cpu
          - cuda
        build-type:
          - release
          - debug
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ matrix.variant }}-${{ matrix.build-type }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: |
            ${{ matrix.variant == 'cuda' && 'RUNTIME_IMAGE=nvidia/cuda:13.0.3-runtime-ubuntu24.04' || '' }}
            BUILD_TYPE=${{ matrix.build-type }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
        env:
          DOCKER_BUILD_SUMMARY: "false"

  # Runs in parallel with build-and-test-desktop-and-web — builds and signs Android
  # APK/AAB packages and generates F-Droid metadata.
  build-android:
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/build-android.yml
    with:
      force: true
    secrets: inherit

  # Gated on all build jobs — pushes to target registries using cached
  # layers from the build-docker job.
  deploy-docker:
    needs: [build-and-test-desktop-and-web, build-docker, build-android]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - cpu
          - cuda
        build-type:
          - release
          - debug
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' && matrix.build-type == 'release' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && matrix.build-type == 'release' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          flavor: |
            prefix=${{ matrix.variant }}-,onlatest=true
            suffix=${{ matrix.build-type == 'debug' && '-debug' || '' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            ${{ matrix.variant == 'cuda' && 'RUNTIME_IMAGE=nvidia/cuda:13.0.3-runtime-ubuntu24.04' || '' }}
            BUILD_TYPE=${{ matrix.build-type }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
        env:
          DOCKER_BUILD_SUMMARY: "false"

  deploy-pages:
    needs: build-and-test-desktop-and-web
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - uses: actions/download-artifact@v8
        with:
          name: build-web-demo-ubuntu-24.04
          path: web-artifact

      # ── Take phone-form-factor screenshots for the README ───────────
      # The Docker image bakes in the exact web demo build plus a pinned
      # version of Playwright, Chromium, SwiftShader, and fonts so that
      # screenshots are identical on every run
      # (runner CI was making wrong screenshots for the 3D viewer before this)
      - shell: bash
        run: |
          mkdir -p .github/scripts/screenshots/public && cp -r web-artifact/. .github/scripts/screenshots/public/
          docker build -t colmap-screenshots .github/scripts/screenshots
      - shell: bash
        run: |
          docker run --rm \
            -v "$PWD/web-artifact/screenshots:/app/screenshots" \
            colmap-screenshots \
              /app/public /app/screenshots /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-artifact
      - uses: actions/deploy-pages@v4

  # Gated on all build jobs — generates a self-hosted F-Droid
  # repository from the signed APKs produced by build-android.
  deploy-android:
    needs: [build-and-test-desktop-and-web, build-docker, build-android]
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/deploy-android.yml
    secrets: inherit

  deploy-release:
    needs: [build-and-test-desktop-and-web, build-android]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: artifacts
      - shell: bash
        run: |
          set -euo pipefail
          echo "📂 Scanning downloaded artifacts..."
          find artifacts -type f
          mkdir -p release_out
          # Iterate per top-level artifact directory
          for dir in artifacts/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            echo "📦 Processing: $name"
            files=()
            while IFS= read -r f; do
              files+=("$f")
            done < <(find "$dir" -type f)
            echo "📊 File count: ${#files[@]}"
            if [ "${#files[@]}" -eq 0 ]; then
              echo "⚠️ Empty artifact dir, skipping"
              continue
            fi
            if [ "${#files[@]}" -eq 1 ]; then
              echo "➡️ Single file → attaching directly"
              cp -v "${files[0]}" "release_out/$(basename "${files[0]}")"
            else
              echo "➡️ Multi-file → zipping"
              zip_name="release-${name}.zip"
              (
                cd "$dir"
                zip -r "../../release_out/$zip_name" .
              )
              echo "✅ Created $zip_name"
            fi
          done
          echo "📦 Final release assets:"
          ls -lah release_out
      - uses: softprops/action-gh-release@v3
        id: release
        if: github.event_name != 'pull_request'
        with:
          files: release_out/*
          draft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: liudonghua123/delete-release-action@v1 # Test that release would succeed, but delete it immediately if it's a non-tag push
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          release_id: ${{ steps.release.outputs.id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Success gate ─────────────────────────────────────────────────────
  success: # or retry on failure to mitigate transient CI issues (e.g. network blips, GitHub Actions flakiness)
    needs:
      - build-and-test-desktop-and-web
      - build-docker
      - build-android
      - deploy-pages
      - deploy-release
      - deploy-docker
      - deploy-android
    if: "!cancelled()"
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - shell: bash
        if: contains(needs.*.result, 'failure') && fromJSON(github.run_attempt) < 3
        run: |
          set -ex
          sleep $((RANDOM % 120 + 10))
          gh workflow run retry-workflow.yml -F run_id=${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
      - shell: bash
        if: contains(needs.*.result, 'failure') && fromJSON(github.run_attempt) >= 3
        run: |
          echo "Workflow failed. Please investigate."
          exit 1
