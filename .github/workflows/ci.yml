on:
  push:
    branches: [main, renovate/**]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libglib2.0-dev libgtk-3-dev
      - run: cargo test --workspace --all-features --lib
      - run: cargo test --workspace --all-features --doc

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build-type: desktop
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build-type: desktop
          - os: macos-26-intel
            target: x86_64-apple-darwin
            build-type: desktop
          - os: macos-26
            target: aarch64-apple-darwin
            build-type: desktop
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            build-type: desktop
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
            build-type: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libglib2.0-dev libgtk-3-dev
      - run: cargo install dioxus-cli
      - run: cargo build --target ${{ matrix.target }} --release --${{ matrix.build-type }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}-${{ matrix.build-type }}
          path: target/dx/${{ github.repository_name }}/*/*

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libglib2.0-dev libgtk-3-dev
      - run: cargo build --package colmap-openmvs-app --target x86_64-unknown-linux-gnu --release --features server
