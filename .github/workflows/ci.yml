on:
  push:
    branches: [main, renovate/**]
    tags:
      - "v*"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build-type: desktop
          - os: ubuntu-24.04-arm
            build-type: desktop
          - os: macos-26-intel
            build-type: desktop
          - os: macos-26
            build-type: desktop
          - os: windows-2025-vs2026
            build-type: desktop
          - os: ubuntu-latest
            build-type: web
          - os: ubuntu-latest
            build-type: android
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld
      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash
      - name: Cargo build
        if: matrix.build-type == 'desktop'
        run: cargo build --release --features server,desktop -vv
        env:
          CARGO_TERM_VERBOSE: true
          CARGO_TERM_COLOR: always
      - shell: bash
        if: matrix.build-type == 'desktop'
        run: $HOME/.dx/bin/dx bundle --release --${{ matrix.build-type }} --features server --verbose
        env:
          CARGO_TERM_VERBOSE: true
          CARGO_TERM_COLOR: always
      - shell: bash
        if: matrix.build-type == 'desktop'
        run: cargo test --workspace --all-targets --all-features
      - shell: bash
        if: matrix.build-type == 'web'
        run: $HOME/.dx/bin/dx bundle --release --${{ matrix.build-type }} --verbose
      - shell: bash
        if: matrix.build-type == 'android'
        run: ./build_android.sh # TODO: --release (needs signing)
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.build-type }}
          path: target/dx

  docker:
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ github.repository }}:buildcache
          cache-to: type=registry,ref=${{ github.repository }}:buildcache,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: artifacts
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
