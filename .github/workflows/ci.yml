on:
  push:
    branches: [main, renovate/**]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld
      - run: cargo test --workspace --all-targets --all-features

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build-type: desktop
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build-type: desktop
          - os: macos-26-intel
            target: x86_64-apple-darwin
            build-type: desktop
          - os: macos-26
            target: aarch64-apple-darwin
            build-type: desktop
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            build-type: desktop
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
            build-type: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libglib2.0-dev libgtk-3-dev
      - run: curl -sSL https://dioxus.dev/install.sh | bash
      - run: $HOME/.dx/bin/dx build --release --target ${{ matrix.target }} --${{ matrix.build-type }}
      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.build-type }}-${{ matrix.target }}
          path: target/dx/${{ github.repository_name }}/*/*
