on:
  push:
    branches: [main, renovate/**]
    tags:
      - "v*"
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.AppImage'"
          - os: ubuntu-24.04-arm
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.AppImage'"
          - os: macos-26-intel
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.dmg'"
          - os: macos-26
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*.dmg'"
          - os: windows-2025-vs2026 # AMD64-only for now...
            build-type: desktop
            artifact-find: "-path '*/bundle/*/*-setup.exe'"
          - os: ubuntu-24.04
            build-type: web
            artifact-find: "-path '*/release/web/*' -not -name '.manifest.json'"
          - os: ubuntu-24.04-arm # Architecture matters for the server binary
            build-type: web
            artifact-find: "-path '*/release/web/*' -not -name '.manifest.json'"
          - os: ubuntu-24.04 # Includes both AMD64 and ARM64 builds, which are merged into a single AAB artifact
            build-type: android
            artifact-find: "-path '*/release/android/*/app-release.aab'"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld
      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash
      - shell: bash
        if: matrix.build-type == 'desktop'
        run: |
          # cargo build --release --features server,desktop -vv # helps detect errors
          $HOME/.dx/bin/dx bundle --release --${{ matrix.build-type }} --features server --verbose
        env:
          CARGO_TERM_VERBOSE: true
          CARGO_TERM_COLOR: always
      - shell: bash
        if: matrix.build-type == 'desktop'
        run: cargo test --workspace --all-targets --all-features
      - shell: bash
        if: matrix.build-type == 'web'
        run: $HOME/.dx/bin/dx bundle --release --${{ matrix.build-type }} --verbose
      - shell: bash
        if: matrix.build-type == 'android'
        run: |
          ./build_android.sh --release --target=arm64
          ./build_android.sh --release --target=x86_64  # Merges both architectures into a single signed AAB
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact_out
          echo "📂 Scanning files..."
          FILES=()
          while IFS= read -r f; do
            FILES+=("$f")
          done < <(find target -type f ${{ matrix.artifact-find }} || true)
          echo "📊 Match summary: ${#FILES[@]} file(s)"
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "❌ No artifacts found."
            echo "📁 Full target/ tree:"
            find target -type f
            exit 1
          fi
          echo "📄 Matched files:"
          for f in "${FILES[@]}"; do
            echo "  - $f"
          done
          echo "--------------------------------------------------"
          if [ "${#FILES[@]}" -eq 1 ]; then
            echo "📦 Single artifact detected → copying directly"
            cp -v "${FILES[0]}" artifact_out/
          else
            echo "📦 Multiple artifacts → copying to output with normalized hierarchy"
            TMPDIR="$(mktemp -d)"
            echo "📁 Staging dir: $TMPDIR"
            # 1. Find common directory prefix
            COMMON_PREFIX=""
            for f in "${FILES[@]}"; do
              dir="$(dirname "$f")"
              if [ -z "$COMMON_PREFIX" ]; then
                COMMON_PREFIX="$dir"
              else
                # reduce to common prefix
                while [[ "$dir" != "$COMMON_PREFIX"* ]]; do
                  COMMON_PREFIX="$(dirname "$COMMON_PREFIX")"
                done
              fi
            done
            echo "📌 Common prefix: $COMMON_PREFIX"
            # 2. Copy files preserving relative structure after prefix
            for f in "${FILES[@]}"; do
              rel="${f#"$COMMON_PREFIX"/}"
              target="artifact_out/$rel"
              mkdir -p "$(dirname "$target")"
              echo "➜ staging: $f → $rel"
              cp -v "$f" "$target"
            done
            rm -rf "$TMPDIR"
          fi
          echo "✅ Final artifact:"
          ls -lah artifact_out/
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.build-type }}
          path: artifact_out/*

  deploy-docker:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        variant:
          - name: cpu
            prefix: cpu-
            build_args: ""
          - name: cuda
            prefix: cuda-
            build_args: |
              RUNTIME_IMAGE=nvidia/cuda:13.2.1-runtime-ubuntu24.04
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          tags: |
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          flavor: |
            prefix=${{ matrix.variant.prefix }},onlatest=true
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          build-args: ${{ matrix.variant.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
        env:
          DOCKER_BUILD_SUMMARY: "false"

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: build-ubuntu-24.04-web
          path: web-artifact
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-artifact/public
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-android:
    if: github.event_name != 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-ubuntu-24.04-android
          path: android-artifact
      - uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.github.yeicor.colmap_openmvs_app
          releaseFiles: android-artifact/app-release.aab
          tracks: ${{ startsWith(github.ref, 'refs/tags/v') && 'production,beta' || 'beta' }}

  deploy-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: artifacts
      - shell: bash
        run: |
          set -euo pipefail
          echo "📂 Scanning downloaded artifacts..."
          find artifacts -type f
          mkdir -p release_out
          # Iterate per top-level artifact directory
          for dir in artifacts/*; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            echo "📦 Processing: $name"
            files=()
            while IFS= read -r f; do
              files+=("$f")
            done < <(find "$dir" -type f)
            echo "📊 File count: ${#files[@]}"
            if [ "${#files[@]}" -eq 0 ]; then
              echo "⚠️ Empty artifact dir, skipping"
              continue
            fi
            if [ "${#files[@]}" -eq 1 ]; then
              echo "➡️ Single file → attaching directly"
              cp -v "${files[0]}" "release_out/$(basename "${files[0]}")"
            else
              echo "➡️ Multi-file → zipping"
              zip_name="release-${name}.zip"
              (
                cd "$dir"
                zip -r "../../release_out/$zip_name" .
              )
              echo "✅ Created $zip_name"
            fi
          done
          echo "📦 Final release assets:"
          ls -lah release_out
      - uses: softprops/action-gh-release@v3
        with:
          files: release_out/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  success: # Meta job that always runs and serves as a simple success signal for the entire workflow
    needs: [build-and-test, deploy-docker] # May not always run: deploy-pages, deploy-android, deploy-release
    if: "!cancelled()"
    runs-on: ubuntu-24.04
    steps:
      - run: |
          all_needs=(echo "${{ toJson(needs) }}" | jq -r 'keys[]')
          for job in $all_needs; do
            echo "$job: ${needs[$job].result}"
            if [ "${needs[$job].result}" != "success" ]; then
              echo "⚠️ Warning: $job did not succeed"
              exit 1
            fi
          done
          echo "🎉 All jobs succeeded!"
