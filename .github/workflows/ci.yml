on:
  push:
    branches: [main, renovate/**]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build-type: desktop
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build-type: desktop
          - os: macos-26-intel
            target: x86_64-apple-darwin
            build-type: desktop
          - os: macos-26
            target: aarch64-apple-darwin
            build-type: desktop
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            build-type: desktop
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
            build-type: web
          - os: ubuntu-latest
            target: aarch64-linux-android
            build-type: android
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"
      - if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld
      - if: runner.build-type == 'android' #SDK + NDK
        shell: bash
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $HOME/cmdline-tools
          yes | $HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/Android/Sdk "cmdline-tools;latest" "platforms;android-34" "build-tools;34.0.0" "ndk;30.0.14904198" "cmake;4.1.2"
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$HOME/Android/Sdk/ndk/30.0.14904198" >> $GITHUB_ENV
          echo "PATH=$PATH:$HOME/Android/Sdk/cmake/4.1.2/bin:$HOME/Android/Sdk/ndk/30.0.14904198" >> $GITHUB_ENV
      - shell: bash
        run: curl -sSL https://dioxus.dev/install.sh | bash
      - shell: bash
        if: runner.build-type != 'android'
        run: $HOME/.dx/bin/dx build --release --target ${{ matrix.target }} --${{ matrix.build-type }}
      - shell: bash
        if: runner.build-type == 'desktop'
        run: cargo test --workspace --all-targets --all-features
      - shell: bash
        if: runner.build-type == 'android'
        run: ./build_android.sh # TODO: --release (needs signing)
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.build-type }}-${{ matrix.target }}
          path: target/dx/${{ github.repository_name }}/*/*
